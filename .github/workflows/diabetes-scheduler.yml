name: Diabetes Scheduler

on:
  schedule:
    # Dual UTC schedules to cover CET/CEST; runner checks Europe/Berlin window.
    - cron: "0 6 * * *"
    - cron: "0 7 * * *"
    - cron: "0 8 * * *"
    - cron: "59 21 * * *"
    - cron: "59 22 * * *"
  workflow_dispatch:
    inputs:
      job:
        description: "Task to run"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - news
          - morning
          - analysis
          - all

concurrency:
  group: diabetes-scheduler
  cancel-in-progress: false

jobs:
  run-scheduled-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GLOOKO_EMAIL: ${{ secrets.GLOOKO_EMAIL }}
      GLOOKO_PASSWORD: ${{ secrets.GLOOKO_PASSWORD }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
      GROQ_BASE_URL: ${{ secrets.GROQ_BASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      FORCE_JOB: ${{ inputs.job || 'auto' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run scheduled task selector
        run: node scripts/github-scheduled-runner.mjs

      - name: Upload Glooko debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: glooko-debug-${{ github.run_id }}
          path: |
            exports/*-glooko-*.png
            exports/*-glooko-*.html
          if-no-files-found: ignore
