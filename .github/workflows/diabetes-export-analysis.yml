name: Diabetes Export & Analysis

on:
  schedule:
    # 23:59 Europe/Berlin (covers CET/CEST)
    - cron: "59 21 * * *"
    - cron: "59 22 * * *"
  workflow_dispatch:

concurrency:
  group: diabetes-export-analysis
  cancel-in-progress: false

jobs:
  export-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GLOOKO_EMAIL: ${{ secrets.GLOOKO_EMAIL }}
      GLOOKO_PASSWORD: ${{ secrets.GLOOKO_PASSWORD }}
      GLOOKO_STORAGE_STATE_BASE64: ${{ secrets.GLOOKO_STORAGE_STATE_BASE64 }}
      GLOOKO_BASE_URL: ${{ secrets.GLOOKO_BASE_URL }}
      GLOOKO_FORCE_REGION: ${{ secrets.GLOOKO_FORCE_REGION }}
      GLOOKO_SKIP_LOGIN: ${{ secrets.GLOOKO_SKIP_LOGIN }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
      GROQ_BASE_URL: ${{ secrets.GROQ_BASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run export + analysis
        run: npm run job:analysis-now

      - name: Upload Glooko debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: glooko-debug-${{ github.run_id }}
          path: |
            exports/*-glooko-*.png
            exports/*-glooko-*.html
          if-no-files-found: ignore
